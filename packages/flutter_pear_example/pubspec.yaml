name: flutter_pear_example
description: "Demos for flutter_pear. M0: worklet echo round-trip."
publish_to: none
version: 0.0.1

environment:
  sdk: '>=3.5.0 <4.0.0'
  flutter: '>=3.24.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_pear:
    path: ../flutter_pear
  # Direct dep: integration_test/ios_spike_test.dart talks to BareWorklet
  # directly (T0 spike, flutter_pear-ovt.1.4) -- otherwise only transitive
  # via flutter_pear.
  flutter_pear_bare:
    path: ../flutter_pear_bare
  path_provider: ^2.1.6
  qr_flutter: ^4.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  # In-memory fake swarm/worklet -- lets file_transfer_controller_test.dart
  # exercise two peers over PearDrive/PearSwarm without a real worklet.
  flutter_pear_test:
    path: ../flutter_pear_test

flutter:
  uses-material-design: true
