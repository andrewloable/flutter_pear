name: flutter_pear_bare
description: Low-level Bare Kit worklet bindings for flutter_pear — worklet lifecycle and raw binary IPC.
version: 0.0.1
# E9.7: publish_to: none removed -- this package is first in the enforced
# publish order (flutter_pear_bare -> flutter_pear -> flutter_pear_test; see
# flutter_pear/pubspec.yaml for why that order, not the "bare -> test -> pear"
# a stale ticket draft once stated) and has no sibling-package dependency of
# its own to flip from path to hosted. Real publishing is a manual, by-hand
# process (no GitHub Actions/CI in this repo) gated behind the E9.8
# publish-day checklist -- removing this field only makes `dart pub publish
# --dry-run` and pana's pub.dev score check meaningful pre-release.
homepage: https://github.com/andrewloable/flutter_pear
# pub.dev's repository-provenance check clones this URL and verifies
# packages/flutter_pear_bare/pubspec.yaml there matches what was published --
# needs `repository:` specifically, `homepage:` alone doesn't satisfy it.
repository: https://github.com/andrewloable/flutter_pear

environment:
  sdk: '>=3.5.0 <4.0.0'
  flutter: '>=3.24.0'

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  xml: ^6.6.1

flutter:
  plugin:
    platforms:
      android:
        package: tech.loable.flutter_pear_bare
        pluginClass: FlutterPearBarePlugin
      ios:
        pluginClass: FlutterPearBarePlugin
