name: flutter_pear_bare
description: Low-level Bare Kit worklet bindings for flutter_pear — worklet lifecycle and raw binary IPC.
version: 0.0.1
publish_to: none
homepage: https://github.com/andrewloable/flutter_pear

environment:
  sdk: '>=3.5.0 <4.0.0'
  flutter: '>=3.24.0'

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  plugin:
    platforms:
      # ponytail: Android-only for M0. iOS (Swift + podspec) is M1 — add the
      # `ios:` block then, mirroring react-native-bare-kit's CocoaPods setup.
      android:
        package: tech.loable.flutter_pear_bare
        pluginClass: FlutterPearBarePlugin
