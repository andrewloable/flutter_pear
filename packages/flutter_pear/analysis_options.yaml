include: package:flutter_lints/flutter.yaml

analyzer:
  exclude:
    # E8.2: generated by tool/extract_snippets.dart, analyzed directly by
    # that tool's own `dart analyze` call -- excluded here so a stale copy
    # left on disk from a previous local run can't cause an unrelated
    # `melos run analyze` to fail.
    - test/readme_snippets.g.dart

linter:
  rules:
    # pub.dev score target ≥130 — every public symbol carries a doc comment.
    public_member_api_docs: true
