name: flutter_pear
description: Dart-idiomatic Flutter API for the Pear P2P stack (Hyperswarm, Hypercore, Hyperbee, Hyperdrive, Autobase, blind pairing) over a bundled Bare worklet.
version: 0.2.1
# E9.7/E9.8: publish_to: none removed for real -- flutter_pear_bare is live
# on pub.dev, confirmed resolvable from a scratch project before this flip.
# This package is being published for real right after this.
homepage: https://github.com/andrewloable/flutter_pear
# pub.dev's repository-provenance check clones this URL and verifies
# packages/flutter_pear/pubspec.yaml there matches what was published
# (no publish_to, correct name/version) -- needs `repository:` specifically,
# `homepage:` alone doesn't satisfy it.
repository: https://github.com/andrewloable/flutter_pear

environment:
  sdk: '>=3.5.0 <4.0.0'
  flutter: '>=3.24.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_pear_bare: ^0.2.0
  # ponytail: SHA-256 for deterministic topics until the worklet's
  # hypercore-crypto is the source of truth. Already-common dep, not custom code.
  crypto: ^3.0.0
  # flutter_pear-7dc: bin/pack.dart's maintainer-only zip extract/create
  # steps (replacing unzip/zip shell-outs) -- same reason crypto is here
  # and not in dev_dependencies: the depend_on_referenced_packages lint
  # flags bin/ imports against dev_dependencies (unlike test/, bin/ gets no
  # analyzer allowance). Never imported by lib/, so tree-shaking keeps it
  # out of a real consumer's built app -- pub.get resolution cost only. MIT
  # (verified against the fetched package's own LICENSE file; its ffi/posix
  # transitives are BSD-3-Clause and MIT respectively).
  archive: ^4.0.9

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  # E3.2 conformance check: PearSwarm/PearRpc run unmodified against the
  # fake. Dev-only, so this doesn't create a real cycle for consumers of
  # flutter_pear (flutter_pear_test's own non-dev dependency on flutter_pear
  # is never resolved transitively through a dev_dependency edge).
  #
  # E9.7 FOLLOW-UP (code review caught this, reversing the previous
  # decision): this MUST stay a `path:` dep, not a hosted constraint --
  # do NOT "uniformize" it to `^0.0.1` again. `dart pub publish
  # --dry-run`/`publish -f` only skip the disallowed-path-source check for
  # dev_dependencies; they do NOT skip dependency *resolution* -- `pub get`
  # still has to solve every dev_dependency too. A hosted
  # `flutter_pear_test: ^0.0.1` here can only resolve via the gitignored,
  # melos-bootstrap-generated pubspec_overrides.yaml (which redirects it
  # back to a local path). That file does not exist in a fresh checkout, and
  # publishing is a manual, by-hand process (no GitHub Actions/CI in this
  # repo) run straight from a real checkout with no `melos bootstrap` step.
  # Worse, flutter_pear_test can only ever be published AFTER flutter_pear
  # (see the publish-order note above), so at the moment flutter_pear's own
  # real `dart pub publish` runs `dart pub get`, flutter_pear_test does not
  # exist on pub.dev at any hosted version yet -- a hard deadlock. Reproduced
  # empirically: with pubspec_overrides.yaml stripped, `dart pub get` here
  # fails with "Because flutter_pear depends on flutter_pear_test any which
  # doesn't exist ... version solving failed" (exit 69). A `path:` dependency
  # has no such problem: `../flutter_pear_test` always exists on disk
  # relative to this package in a real checkout, published-sibling-or-not --
  # and, per the paragraph above, pub's publish validator never complains
  # about a dev-only path dependency in the first place.
  flutter_pear_test:
    path: ../flutter_pear_test

flutter:
  assets:
    - assets/pear-end.bundle
    # flutter_pear-6yz (E-D3): per-desktop-host bundle (bare-pack
    # --offload-addons, no --linked -- see bin/pack.dart's
    # buildDesktopBundle doc comment) plus every offloaded addon's own
    # prebuild directory -- Flutter's directory-form assets (a trailing
    # slash) are NOT recursive, confirmed by testing: a nested
    # node_modules/*/prebuilds/<host>/*.bare tree was silently dropped from
    # a real built macOS app until each leaf directory was listed
    # explicitly, and a host's own top-level directory (for its
    # pear-end.bundle file) was ONCE hand-maintained here and silently
    # missed when linux-x64 was added (flutter_pear-65g) -- both are now
    # fully regenerated by bin/pack.dart's updateDesktopAssetList on every
    # `:pack` run. Do not hand-edit between the markers, hand edits are
    # overwritten.
    # BEGIN desktop addon asset dirs (auto-generated, do not edit)
    - assets/desktop/darwin-arm64/
    - assets/desktop/darwin-arm64/node_modules/bare-fs/prebuilds/darwin-arm64/
    - assets/desktop/darwin-arm64/node_modules/bare-inspect/prebuilds/darwin-arm64/
