name: flutter_pear_test
description: In-memory fake Pear swarm/worklet for unit-testing flutter_pear apps without radios or real peers.
version: 0.3.1
# E9.7/E9.8: publish_to: none removed for real -- flutter_pear_bare and
# flutter_pear are both live on pub.dev (published 2026-07-06), each
# confirmed resolvable from a scratch project before this flip. This is the
# last package in the publish order (flutter_pear_bare -> flutter_pear ->
# flutter_pear_test), being published for real right after this.
homepage: https://github.com/andrewloable/flutter_pear
# pub.dev's repository-provenance check clones this URL and verifies
# packages/flutter_pear_test/pubspec.yaml there matches what was published --
# needs `repository:` specifically, `homepage:` alone doesn't satisfy it.
repository: https://github.com/andrewloable/flutter_pear

environment:
  sdk: '>=3.5.0 <4.0.0'
  flutter: '>=3.24.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_pear: ^0.3.1
  flutter_pear_bare: ^0.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
