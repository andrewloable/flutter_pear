name: Fresh machine (TTHW gate)

# E9.3 (flutter_pear-df9.3), the champion-tier commitment locked in the E7
# epic (DX D3): clone -> flutter_pear added to a brand-new app -> built ->
# installed+launched on an emulator -> worklet attached, all within a
# budget derived from the 5-minute human "Time To Hello World" commitment.
#
# Deliberately NOT the flutter_pear_example repo itself: that app is
# hand-tuned and already in this monorepo, exactly the "works on my
# machine" trap this job exists to catch (see flutter_pear-k2y, a real bug
# that only manifested for an app OUTSIDE this repo). This job creates a
# brand-new `flutter create` app on the runner and adds flutter_pear as a
# path dependency pointing at this checkout -- the same shape of install
# the README's pre-publish git-dependency method produces (a full clone,
# consuming app elsewhere entirely), and the shape `flutter pub add
# flutter_pear` will produce once E9.7 flips to a hosted dependency.
#
# Cold caches deliberately: no Gradle/pub cache restore step. The whole
# point is the untouched first-time experience, not a warm-cache best
# case -- a real evaluator's first `flutter build` pays for Gradle's own
# distribution download, AGP/Kotlin Gradle Plugin resolution, and every
# AndroidX artifact, none of which a repeat contributor's machine pays for.
#
# Budget mapping (documented per this ticket's own STEP 2 instruction):
# the human TTHW commitment is 5 minutes (300s) measured on a developer's
# machine that ALREADY has Flutter, Android tooling, and an emulator/device
# ready -- it does not include installing that tooling. A CI runner starts
# with none of that primed either, but this job only starts its own clock
# AFTER the emulator has already booted (see the `script:` step below --
# reactivecircus/android-emulator-runner blocks on boot before running
# `script:`, so boot time is excluded from the timed window the same way a
# human's already-running emulator excludes it from theirs). What the human
# budget doesn't pay for and this job's clock still includes: Gradle's own
# first-ever distribution/plugin download on a genuinely cold runner. The
# budget below (FRESH_MACHINE_BUDGET_SECONDS) is therefore set to 2x the
# human commitment -- 600s -- as a documented, deliberate allowance for
# that CI-specific cold-provisioning cost, not a loosening of the
# commitment itself. Tighten this if/when repeated runs show it's overly
# generous; the number is meant to be revisited, not treated as sacred.
#
# The QR-scan / two-peer "message appears on both screens" moment (the
# rest of the champion-tier promise) needs a camera and a second device --
# this job proves create -> app-running-on-emulator -> worklet attached
# only. The full human moment remains the quarterly /devex-review audit
# (locked decision D12) -- a CI job cannot feel a camera permission prompt
# or a cold Android Studio install.
#
# REVIEW FIXES (multi-lens review of this file's first draft caught real
# bugs before this ever ran for real -- no GitHub Actions execution is
# available in this dev environment, so this file has never actually been
# tested end to end; treat the first real run's outcome as informative,
# not just this review):
# - arch/runner mismatch (critical): the first draft ran an x86_64 emulator
#   on `macos-latest`, which points at an Apple-Silicon (arm64) host as of
#   the macos-14 image generation -- Apple's Hypervisor.framework only
#   hardware-accelerates arm64-v8a Android guests, so an x86_64 guest would
#   fall back to unaccelerated software emulation and blow the budget (or
#   the job timeout) on every single run. Fixed by switching to
#   arch: arm64-v8a + a newer API level (arm64 system images aren't
#   published for the old api-level 29 this file used to target) -- this
#   exact runner/arch pairing is independently corroborated by
#   flutter_pear-df9.4's own CODEX AUDIT FIX note: "GitHub macOS runners
#   (macos-14+) are Apple-silicon and run arm64-v8a Android system images
#   with hardware acceleration."
# - Dropped the AVD cache step entirely rather than hardening it: a static
#   cache key + force-avd-creation:false + no warm-up-boot step (the
#   two-phase pattern the action's own docs recommend) meant a partial/
#   corrupted AVD from an interrupted run could get cached and silently
#   reused forever. A cold AVD create+boot on every run costs a couple of
#   extra minutes but can't wedge itself into a permanently-broken cached
#   state -- correctness over speed here.
# - Widened timeout-minutes (20 -> 35): the documented self-test
#   (inject_delay_seconds past the budget) needs enough job-level headroom
#   to actually reach this script's own informative ::error::/summary
#   output, rather than being preempted by GitHub's own generic
#   maximum-execution-time cancellation, which would prove nothing.
# - Scoped triggers to push on main + workflow_dispatch (was: push AND
#   pull_request with no filter) -- this ticket's own VALIDATION line only
#   asks for "job green on main", not a macOS-plus-emulator job (the most
#   expensive tier available) on every branch push and every PR sync of
#   the same commit. Added a concurrency group so rapid successive pushes
#   to main don't queue redundant overlapping runs either.
# - FOUND vs CRASHED are now distinct signals, so a worklet exception
#   surfaces as a different, more specific failure than a silent hang.
# - The step summary's elapsed-time row is now labeled honestly on a
#   failed run instead of implying an attach that didn't happen.
# - Added ::group::/::endgroup:: log folding per phase (create, build,
#   install+launch, poll) -- reactivecircus/android-emulator-runner runs
#   this whole sequence as one script inside one step (splitting into
#   literal separate steps would mean re-booting the emulator between
#   them), so this is the cheapest available improvement to localizing
#   which phase a slow or failed run actually stalled in from the raw log.

on:
  push:
    branches: [main]
  # Manual-only knob for this ticket's own VALIDATION requirement: prove
  # the budget gate actually fails when the sequence runs too slow. Run
  # this workflow manually with inject_delay_seconds set past the budget
  # (e.g. 700) to self-test the gate; leave at 0 for every normal run. Also
  # the way to run this job against a branch/PR on demand, since the push
  # trigger above is deliberately scoped to main only (see header comment).
  workflow_dispatch:
    inputs:
      inject_delay_seconds:
        description: >-
          Seconds to sleep before building, to prove the TTHW budget gate
          fails (E9.3 VALIDATION). Leave 0 for a normal run.
        required: false
        default: '0'

concurrency:
  group: fresh-machine-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fresh-machine:
    # macOS runner: reactivecircus/android-emulator-runner needs hardware
    # acceleration for a usable emulator boot time. GitHub-hosted
    # macos-latest runners are Apple Silicon (arm64 host) as of the
    # macos-14 image generation -- paired with arch: arm64-v8a below (NOT
    # x86_64; see header comment), Apple's Hypervisor.framework
    # accelerates the guest natively.
    runs-on: macos-latest
    timeout-minutes: 35
    env:
      FRESH_MACHINE_BUDGET_SECONDS: 600
      INJECT_DELAY_SECONDS: ${{ github.event.inputs.inject_delay_seconds || '0' }}
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          # No cache: true -- cold Flutter SDK fetch is part of the
          # untouched-first-time experience this job exists to measure.

      - name: Create a brand-new external consumer app and probe it on an
          emulator, timed
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 31
          target: default
          arch: arm64-v8a
          force-avd-creation: true
          emulator-options: >-
            -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
            -camera-back none
          disable-animations: true
          script: |
            set -euo pipefail

            # Timer starts here, AFTER the emulator above is already
            # booted and ready for adb -- see this file's header comment
            # for why boot time is deliberately excluded.
            START=$(date +%s)

            if [ "${INJECT_DELAY_SECONDS}" != "0" ]; then
              echo "TTHW self-test: sleeping ${INJECT_DELAY_SECONDS}s to prove the budget gate fails"
              sleep "${INJECT_DELAY_SECONDS}"
            fi

            echo "::group::Create app + add flutter_pear"
            cd "${RUNNER_TEMP}"
            flutter create fresh_machine_probe
            cd fresh_machine_probe

            # Path, not git: a git dependency would need this ref pushed
            # and reachable, which a PR from a fork can't guarantee. A
            # path dependency into this exact checkout exercises the same
            # Gradle-side resolution flutter_pear_k2y's fix targets (a
            # consuming app living OUTSIDE packages/flutter_pear, finding
            # pear-end's linked native addons with zero custom Gradle
            # task) without needing anything pushed first.
            flutter pub add flutter_pear --path "${GITHUB_WORKSPACE}/packages/flutter_pear"

            cat > lib/main.dart <<'DARTEOF'
            import 'package:flutter/material.dart';
            import 'package:flutter_pear/flutter_pear.dart';

            void main() {
              runApp(const FreshMachineProbeApp());
            }

            class FreshMachineProbeApp extends StatefulWidget {
              const FreshMachineProbeApp({super.key});

              @override
              State<FreshMachineProbeApp> createState() =>
                  _FreshMachineProbeAppState();
            }

            class _FreshMachineProbeAppState
                extends State<FreshMachineProbeApp> {
              String _status = 'starting...';

              @override
              void initState() {
                super.initState();
                _boot();
              }

              Future<void> _boot() async {
                try {
                  final pear = await Pear.start();
                  // fresh-machine.yml polls logcat for this exact string
                  // as the "worklet attached" readiness signal -- keep
                  // both sides in sync if either changes.
                  // ignore: avoid_print
                  print('FRESH_MACHINE_WORKLET_ATTACHED');
                  setState(() => _status = 'worklet attached');
                  await pear.dispose();
                } catch (e) {
                  // ignore: avoid_print
                  print('FRESH_MACHINE_WORKLET_FAILED: $e');
                  setState(() => _status = 'failed: $e');
                }
              }

              @override
              Widget build(BuildContext context) => MaterialApp(
                    home: Scaffold(body: Center(child: Text(_status))),
                  );
            }
            DARTEOF
            echo "::endgroup::"

            echo "::group::Build (cold Gradle/AGP/AndroidX resolution)"
            flutter build apk --debug --target-platform android-arm64
            echo "::endgroup::"

            echo "::group::Install + launch"
            adb install -r build/app/outputs/flutter-apk/app-debug.apk
            adb logcat -c
            adb shell am start -n com.example.fresh_machine_probe/.MainActivity
            echo "::endgroup::"

            echo "::group::Poll for worklet-attach readiness"
            FOUND=0
            CRASHED=0
            # 90 x 2s = 180s of polling headroom on top of everything
            # already spent above -- generous on purpose: this loop is
            # "did the worklet attach at all", not itself the budget gate
            # (the elapsed-time check below is).
            for _ in $(seq 1 90); do
              if adb logcat -d | grep -q "FRESH_MACHINE_WORKLET_ATTACHED"; then
                FOUND=1
                break
              fi
              if adb logcat -d | grep -q "FRESH_MACHINE_WORKLET_FAILED"; then
                CRASHED=1
                echo "::error::worklet reported a failure -- see logcat above"
                adb logcat -d | grep "FRESH_MACHINE_WORKLET_FAILED"
                break
              fi
              sleep 2
            done
            echo "::endgroup::"

            END=$(date +%s)
            ELAPSED=$((END - START))
            if [ "$FOUND" = "1" ]; then
              RESULT_LABEL="✅ yes"
              ELAPSED_LABEL="Elapsed (create → attach)"
            elif [ "$CRASHED" = "1" ]; then
              RESULT_LABEL="❌ NO (worklet threw -- see FRESH_MACHINE_WORKLET_FAILED above)"
              ELAPSED_LABEL="Elapsed (create → failure, NOT a successful attach)"
            else
              RESULT_LABEL="❌ NO (never observed within the polling window)"
              ELAPSED_LABEL="Elapsed (create → poll timeout, NOT a successful attach)"
            fi

            {
              echo "### Fresh-machine TTHW result"
              echo
              echo "| Metric | Value |"
              echo "|---|---|"
              echo "| Worklet attached | ${RESULT_LABEL} |"
              echo "| ${ELAPSED_LABEL} | ${ELAPSED}s |"
              echo "| Budget | ${FRESH_MACHINE_BUDGET_SECONDS}s |"
              echo "| Self-test delay injected | ${INJECT_DELAY_SECONDS}s |"
            } >> "${GITHUB_STEP_SUMMARY}"

            if [ "$CRASHED" = "1" ]; then
              echo "::error::worklet threw during Pear.start() -- a real regression, not a timing issue"
              exit 1
            fi
            if [ "$FOUND" != "1" ]; then
              echo "::error::worklet never attached within the polling window"
              exit 1
            fi
            if [ "$ELAPSED" -gt "${FRESH_MACHINE_BUDGET_SECONDS}" ]; then
              echo "::error::TTHW budget exceeded: ${ELAPSED}s > ${FRESH_MACHINE_BUDGET_SECONDS}s"
              exit 1
            fi
            echo "TTHW OK: ${ELAPSED}s (budget ${FRESH_MACHINE_BUDGET_SECONDS}s)"
