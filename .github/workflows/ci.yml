name: CI

# E3.4 (flutter_pear-0ux.4): the fake (flutter_pear_test) is the default CI
# substrate -- the `test` job below exercises the full Dart stack on a
# hosted runner with zero devices/emulators. Real Android builds, on-device
# smoke tests and the release/permission/consumer-rule matrix are the
# `release-build` / `emulator-*` jobs further down (E9.4, flutter_pear-df9.4)
# -- kept in this same file per that ticket's own FILES line ("matrix
# additions to the E3.4 pipeline"), not a separate workflow, unlike E9.3's
# fresh-machine.yml (a distinct, LOCKED TTHW commitment with its own
# separate-file precedent -- see that file's header for why THAT one is
# split out).
on:
  push:
  pull_request:
  # E9.4: lets a maintainer re-run the release/emulator jobs below on
  # demand (e.g. against a branch, to self-test a change to this file) --
  # those jobs also already run on every push/PR automatically, same as
  # `test` (see the E9.4 header comment further down for why).
  workflow_dispatch:
    inputs:
      run_benchmark:
        description: >-
          Also run the E5.1 bulk-transport throughput benchmark
          (flutter_pear_example's integration_test/bulk_transport_benchmark_test.dart)
          -- a timing measurement backing the LOCKED decision record in
          packages/flutter_pear/BENCHMARK.md, NOT a pass/fail correctness
          test. Deliberately excluded from the regular per-push matrix below
          (timing noise on shared CI hardware would make a routine job
          flaky for no correctness benefit, and it would re-run on every
          push for no reason -- its numbers only matter when deliberately
          re-validating that decision record). Leave unchecked for a normal
          manual run of this workflow.
        required: false
        default: false
        type: boolean

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Activate melos
        run: dart pub global activate melos

      - name: melos bootstrap
        run: melos bootstrap

      - name: melos run analyze
        run: melos run analyze

      - name: Compatibility table vs. real pins (E9.5)
        # Diffs COMPATIBILITY.md's version + toolchain tables against each
        # value's real source of truth (build.gradle, pubspec.yaml,
        # pear-end/package.json, the example app's gradle-wrapper.properties,
        # root CLAUDE.md) and fails loud, naming the exact field and both
        # disagreeing values, on any drift. Placed early (right after
        # analyze) so a stale doc fails fast, before the slower JS/Dart test
        # steps below run.
        working-directory: packages/flutter_pear
        run: dart run bin/check_compatibility.dart

      - name: Extract + analyze README/docs snippets (E8.2, E8.6)
        working-directory: packages/flutter_pear
        run: |
          dart run tool/extract_snippets.dart ../../README.md README.md \
            doc/concepts.md doc/howto-chat.md doc/howto-filesync.md doc/howto-pairing.md

      - name: Generate pear-end/version.js (gitignored; index.js requires it)
        working-directory: packages/flutter_pear
        run: dart run flutter_pear:pack --version-only

      - name: pear-end JS-level tests (flutter_pear-pcg)
        # node --test with an explicit directory-path argument doesn't
        # auto-discover on the Node versions checked (see
        # pear-end/test/autobase-recipes.test.js's header) -- running with no
        # args from this working-directory relies on its recursive
        # **/*.test.js discovery instead.
        working-directory: packages/flutter_pear/pear-end
        run: |
          npm ci
          npm test

      - name: melos run test
        # --no-select: this melos version otherwise prompts interactively
        # to pick a package even in a non-interactive shell, since the
        # `test` script's packageFilters make melos treat it as a
        # single-package-selection script by default.
        run: melos run test --no-select

      - name: pub.dev score gate -- pana >= 130 (E8.7)
        # The only current deduction is publish_to: none (intentional --
        # pre-publish, flips at E9.7) capping the "valid pubspec.yaml"
        # sub-check; each package still clears 130 comfortably today.
        run: |
          dart pub global activate pana
          fail=0
          for pkg in flutter_pear flutter_pear_bare flutter_pear_test; do
            # Redirect to a file rather than capturing via $(...): pana's
            # own subprocess output has occasionally interleaved raw control
            # bytes into a piped stdout capture, which breaks jq's strict
            # JSON parsing -- a plain file write doesn't see that.
            dart pub global run pana --no-warning --json "packages/$pkg" \
              > "/tmp/pana-$pkg.json" 2>/dev/null
            granted=$(jq '.scores.grantedPoints' "/tmp/pana-$pkg.json")
            max=$(jq '.scores.maxPoints' "/tmp/pana-$pkg.json")
            echo "$pkg: $granted / $max"
            if [ "$granted" -lt 130 ]; then
              echo "::error::$pkg scored $granted/$max, below the 130 pub.dev score gate"
              fail=1
            fi
          done
          exit $fail

  # ---------------------------------------------------------------------
  # E9.4 (flutter_pear-df9.4): "debug-only emulator CI would mask exactly
  # the failures that hit real users: ABI gaps and release-mode stripping."
  # The `test` job above never builds a real Android artifact (fake-worklet
  # Dart tests only) -- these jobs do, on both ABIs this plugin ships
  # (arm64-v8a + x86_64, per COMPATIBILITY.md), in both debug-on-emulator
  # and full-R8-release shapes.
  #
  # Runner/arch pairing (deliberately NOT re-derived from scratch here --
  # this ticket's own CODEX AUDIT FIX note already specifies it, and it
  # matches the same fact fresh-machine.yml's first-draft review corrected
  # the hard way): GitHub-hosted `ubuntu-latest` has KVM for
  # hardware-accelerated x86_64 guests; GitHub-hosted `macos-latest` has
  # been an Apple Silicon (arm64) host since the macos-14 image generation,
  # and Apple's Hypervisor.framework only hardware-accelerates arm64-v8a
  # Android guests. x86_64-on-macOS or arm64-v8a-on-Linux would both run
  # unaccelerated (or not at all) -- don't swap these.
  #
  # Trigger scoping (CORRECTED post-review -- see flutter_pear-df9.4 closing
  # notes): the ACCEPTANCE CRITERIA text is verbatim "...run per-package
  # integration tests + release appbundle job per push", not "on main only".
  # An earlier draft of this file gated the two `emulator-*` jobs to
  # push-to-main + workflow_dispatch (copying fresh-machine.yml's own,
  # differently-motivated scope) and justified skipping PRs/branches by
  # calling `release-build` "cheap, ~1-2 CPU-minutes" -- both of those were
  # wrong: (a) a feature-branch push or PR with an ABI/worklet-timing
  # regression went uncaught pre-merge, contradicting this ticket's own
  # "catch ABI gaps before merge" CONTEXT line, and (b) `release-build` runs
  # a full R8 release build, an `sdkmanager` install, a `bundletool`
  # download+conversion and two `aapt2`/`unzip` passes -- not cheap, and its
  # own timeout-minutes (20, now 30) already admitted as much. All three
  # jobs below now run on every push AND pull_request (no job-level `if:`),
  # same as `test` above, exactly matching the literal ACCEPTANCE wording.
  # workflow_dispatch remains available on all of them for an on-demand
  # re-run against any branch.
  #
  # Cost/redundancy control is now done the right way -- not by skipping
  # runs, but by making each run itself cheaper and by cancelling
  # superseded ones: every job below has a `concurrency:` group (rapid
  # pushes to the same branch/PR cancel the stale run instead of queuing
  # it, the same fix fresh-machine.yml's own first-draft review already
  # established), plus Flutter SDK caching (`cache: true`), Gradle caching
  # (`cache: gradle`), and -- for the three emulator-booting jobs -- a
  # cached AVD snapshot (the officially documented
  # reactivecircus/android-emulator-runner two-step recipe: a
  # cache-or-create step, then the real boot+test step reusing that
  # snapshot). None of that caching applies to fresh-machine.yml itself,
  # deliberately -- that workflow's entire point is measuring a genuinely
  # COLD machine's time-to-hello-world, so caching there would defeat its
  # own purpose. These jobs measure correctness, not freshness, so caching
  # is a pure win here.
  #
  # Known remaining gap (tracked, not silently dropped): "per-package
  # integration tests" is today still only real for flutter_pear_example
  # (ipc_transport_test.dart) -- flutter_pear_bare (named explicitly in
  # STEP 2, lifecycle/reattach-or-kill), flutter_pear, and flutter_pear_test
  # have no integration_test/ suite yet to run against a real worklet. The
  # loop in each emulator job's "per-package integration tests" step below
  # already picks up any package's integration_test/ the moment one lands
  # (zero further ci.yml edits needed) -- but until then this is
  # infrastructure readiness, not coverage. See flutter_pear-g28 for the
  # tracked follow-up to actually add those suites.
  # ---------------------------------------------------------------------

  release-build:
    name: Release appbundle + permission/consumer-rule assertions (STEPS 3-4)
    runs-on: ubuntu-latest
    # Was 20 -- raised to 30. This job is NOT "cheap, ~1-2 CPU-minutes" (an
    # earlier draft of this comment said so and was wrong, per
    # flutter_pear-df9.4's closing review): it's a full `flutter build
    # appbundle --release` with R8 minification, a `sdkmanager`
    # build-tools install, a `bundletool` download+conversion, and two
    # `aapt2`/`unzip` inspection passes -- with no prior empirical GitHub
    # Actions run of this exact job to time it against. 30 gives headroom
    # for a cold-cache first run; the Gradle/Flutter caching below should
    # make steady-state runs meaningfully faster than that ceiling.
    timeout-minutes: 30
    concurrency:
      # Same fix as the emulator jobs below: this job now runs on every
      # push AND pull_request (see header comment) with no path/branch
      # filter, so rapid successive pushes to the same branch/PR would
      # otherwise queue multiple full, non-cancelable release builds for
      # commits that are already stale by the time they'd run.
      group: ci-release-build-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: flutter build appbundle --release (flutter_pear_example, R8 on)
        # STEP 3, literal: "flutter build appbundle --release must succeed
        # with R8 (consumer rules from E4.5 verified by build, not by
        # hope)." Built against flutter_pear_example -- a real, full-feature
        # consuming app already in this monorepo -- not a synthetic
        # throwaway app: unlike fresh-machine.yml (which deliberately
        # avoids this app to prove a FRESH install experience),
        # this step is about R8/release-mode correctness for an app that
        # actually exercises this plugin, which fresh-machine.yml's
        # brand-new `flutter create` app deliberately does not.
        working-directory: packages/flutter_pear_example
        run: flutter build appbundle --release

      - name: Consumer-rules.pro keep-rule assertion, from R8's own mapping output (STEP 3/VALIDATION)
        # "Verified by build, not by hope" turns out to require MORE than
        # "did `flutter build` above exit 0": confirmed locally
        # (flutter_pear-df9.4) that deleting
        # flutter_pear_bare/android/consumer-rules.pro's one -keep line
        # entirely and rebuilding *still* succeeds -- R8 has no way to know
        # a JNI GetMethodID/CallVoidMethod call depends on an unobfuscated
        # name, so a broken consumer-rules.pro produces an artifact that
        # only crashes at RUNTIME ("JNI DETECTED ERROR IN APPLICATION: mid
        # == null"), not a build failure. The real, local, reproducible
        # signal: with the rule removed, R8's own mapping.txt drops from 11
        # to 2 top-level `to.holepunch.bare.kit.*` class entries -- every
        # JNI callback interface (IPC$PollCallback/ReadCallback/
        # WriteCallback, Worklet$NativePushCallback/PushCallback/Options)
        # disappears outright, and IPC/Worklet's own methods get renamed
        # (`read` -> `a`, etc). That's what this step actually checks for,
        # not "did the build succeed".
        working-directory: packages/flutter_pear_example
        run: |
          set -euo pipefail
          MAPPING="build/app/outputs/mapping/release/mapping.txt"
          if [ ! -f "$MAPPING" ]; then
            echo "::error::no R8 mapping.txt produced -- did the release build above actually run R8 (minifyEnabled)?"
            exit 1
          fi
          # The exact surface flutter_pear_bare/android/consumer-rules.pro's
          # `-keep class to.holepunch.bare.kit.** { *; }` promises to keep
          # BOTH present and unobfuscated -- see that file's own comment for
          # the full JNI rationale. Update this list if bare-kit's native-
          # binding Java surface ever changes shape.
          fail=0
          for cls in \
            'to.holepunch.bare.kit.IPC' \
            'to.holepunch.bare.kit.IPC$PollCallback' \
            'to.holepunch.bare.kit.IPC$ReadCallback' \
            'to.holepunch.bare.kit.IPC$WriteCallback' \
            'to.holepunch.bare.kit.Worklet' \
            'to.holepunch.bare.kit.Worklet$NativePushCallback' \
            'to.holepunch.bare.kit.Worklet$Options' \
            'to.holepunch.bare.kit.Worklet$PushCallback'; do
            if ! grep -qF "${cls} -> ${cls}:" "$MAPPING"; then
              echo "::error::R8 did not keep '${cls}' present+unobfuscated in the release build -- consumer-rules.pro's -keep for to.holepunch.bare.kit.** has regressed. This class is called by name via JNI from libbare-kit.so and WILL crash release builds at runtime (see consumer-rules.pro's own comment)."
              fail=1
            fi
          done
          exit $fail

      - name: Ensure Android build-tools 34.0.0 (aapt2) are installed
        # GitHub-hosted runners ship an Android SDK (confirmed via
        # actions/runner-images' own Ubuntu image manifest: build-tools
        # 34.0.0 is already there today) but not necessarily every
        # build-tools version forever -- pinning + installing one
        # explicitly here means the aapt2 invocations below aren't at the
        # mercy of whatever happens to already be on the runner image on a
        # given day (an unpinned "hope it's there" dependency is exactly
        # the class of thing this ticket exists to replace with a real,
        # checked assertion). Full path, not a bare `sdkmanager` call: PATH
        # containing cmdline-tools/bin is a runner-image detail this
        # doesn't want to depend on.
        run: |
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --install "build-tools;34.0.0" > /dev/null

      - name: Download bundletool (pinned + checksum-verified)
        # aapt2 can't read a .aab directly -- bundletool's build-apks turns
        # it into a real, installable/inspectable APK first. Pinned to an
        # exact release + sha256-verified, the same treatment
        # flutter_pear_bare/android/build.gradle already gives the Bare Kit
        # prebuild download (bareKitSha256) -- not a moving "latest" URL.
        run: |
          set -euo pipefail
          curl -sSL -o /tmp/bundletool.jar \
            https://github.com/google/bundletool/releases/download/1.18.1/bundletool-all-1.18.1.jar
          echo "675786493983787ffa11550bdb7c0715679a44e1643f3ff980a529e9c822595c  /tmp/bundletool.jar" | sha256sum -c -

      - name: Build a universal APK from the release .aab
        working-directory: packages/flutter_pear_example
        run: |
          set -euo pipefail
          java -jar /tmp/bundletool.jar build-apks \
            --bundle=build/app/outputs/bundle/release/app-release.aab \
            --output=/tmp/release.apks \
            --mode=universal
          rm -rf /tmp/release_extract
          mkdir /tmp/release_extract
          unzip -o -q /tmp/release.apks -d /tmp/release_extract

      - name: Assert the merged release manifest carries INTERNET (STEP 4)
        # Inspects the ACTUAL merged manifest of a real built artifact --
        # not a re-read of flutter_pear_bare's own source
        # AndroidManifest.xml, which would prove nothing about the manifest
        # merger actually running. Confirmed locally (flutter_pear-df9.4):
        # deleting that source file's
        # <uses-permission android:name="android.permission.INTERNET"/>
        # line and rebuilding makes it provably vanish from this exact
        # aapt2 dump.
        run: |
          set -euo pipefail
          AAPT2="$ANDROID_HOME/build-tools/34.0.0/aapt2"
          PERMS="$("$AAPT2" dump permissions /tmp/release_extract/universal.apk)"
          echo "$PERMS"
          if ! echo "$PERMS" | grep -q 'android\.permission\.INTERNET'; then
            echo "::error::merged release manifest is missing android.permission.INTERNET -- flutter_pear_bare/android/src/main/AndroidManifest.xml's declaration didn't survive the manifest merge. The worklet needs raw sockets for Hyperswarm/DHT; this would silently fail at runtime instead of failing this build."
            exit 1
          fi

      - name: Assert every committed native-addon .so ships in the release artifact
        # CONTEXT (flutter_pear-df9.4 notes, from flutter_pear-k2y's fix):
        # linkNativeAddons now runs at PACK time, not at a consumer's build
        # time -- its output is the committed
        # flutter_pear_bare/android/src/main/jniLibs/<abi>/ directory.
        # Nothing before this job ever verified those committed files
        # actually reach a *built* APK; this is that backstop.
        run: |
          set -euo pipefail
          fail=0
          for abi in arm64-v8a x86_64; do
            for so in packages/flutter_pear_bare/android/src/main/jniLibs/"$abi"/*.so; do
              name="$(basename "$so")"
              if ! unzip -l /tmp/release_extract/universal.apk | grep -qF "lib/$abi/$name"; then
                echo "::error::lib/$abi/$name (committed under flutter_pear_bare's jniLibs/) is missing from the built release APK -- linkNativeAddons's pack-time output and the actual build have drifted apart."
                fail=1
              fi
            done
          done
          exit $fail

  emulator-x86_64:
    name: Emulator smoke (x86_64, API ${{ matrix.api-level }})
    runs-on: ubuntu-latest
    # Was 25 -- raised to 35, matching fresh-machine.yml's own empirically-
    # reasoned budget (see that file's header) for a comparably-scoped cold
    # AVD create/boot/install/poll sequence -- this job's first run against
    # a given cache key (before the AVD cache below is warm) is exactly
    # that class of sequence. Later runs should land well under this
    # thanks to the AVD/Gradle/Flutter caching added below; 35 is sized
    # for the uncached worst case, not the common case. None of these
    # numbers has run in real GitHub Actions yet -- revisit against actual
    # observed durations once this job has a run history.
    timeout-minutes: 35
    concurrency:
      group: ci-emulator-x86_64-${{ matrix.api-level }}-${{ github.ref }}
      cancel-in-progress: true
    strategy:
      fail-fast: false
      matrix:
        # STEP 1, literal: "API level = minSdk AND a current level" --
        # deliberately NOT the Gradle-level minSdk (24) here, though.
        # flutter_pear_bare/android/build.gradle's own minSdk comment says
        # so directly: "Bare Kit's own prebuild declares minSdkVersion 31
        # (see its AndroidManifest.xml) -- untested below that. 24 is kept
        # as this library's floor for the M0 echo." Running the REAL
        # worklet-attach smoke at API 24 would be testing a combination
        # this codebase already documents as unsupported, not catching a
        # real regression -- that's a guaranteed-red leg for a known,
        # unrelated reason, not a useful signal. 31 is Bare Kit's own
        # documented actual floor, so that's this job's "min" leg. 34 is
        # COMPATIBILITY.md's pinned Android compileSdk ("current"). Revisit
        # if flutter_pear_bare's minSdk comment is ever updated (e.g. once
        # E1.3-class validation actually confirms API 24-30 support).
        api-level: [31, 34]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Enable KVM group perms
        # Required for hardware-accelerated x86_64 emulation on GitHub-hosted
        # Linux runners -- reactivecircus/android-emulator-runner's own docs
        # call this out explicitly; without it the emulator falls back to
        # unaccelerated software emulation and risks this job's timeout.
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: flutter pub get (flutter_pear_example)
        working-directory: packages/flutter_pear_example
        run: flutter pub get

      - name: AVD cache
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-ubuntu-x86_64-${{ matrix.api-level }}-v1

      - name: create AVD and generate snapshot for caching
        # Official reactivecircus/android-emulator-runner two-step caching
        # recipe (its own README): on a cache MISS this step actually
        # creates+boots+snapshots the AVD once; on a cache HIT it's
        # skipped entirely and the real run below reuses the cached
        # snapshot instead of a from-scratch cold boot on every run --
        # this is the caching finding 4 raised (no AVD cache existed
        # before, on top of no Flutter SDK/Gradle cache either).
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          target: default
          arch: x86_64
          force-avd-creation: false
          emulator-options: >-
            -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
            -camera-back none
          disable-animations: false
          script: echo "Generated AVD snapshot for caching."

      - name: Boot x86_64 emulator + run the real-worklet integration smoke (STEPS 1-2)
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          target: default
          arch: x86_64
          force-avd-creation: false
          emulator-options: >-
            -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
            -camera-back none
          disable-animations: true
          script: |
            set -euo pipefail
            # Per-package integration coverage (STEP 2, tracked as
            # flutter_pear-g28): run every non-benchmark integration_test
            # file, one at a time, across every package -- INCLUDING
            # flutter_pear_example, uniformly. This used to special-case
            # flutter_pear_example (running only ipc_transport_test.dart
            # explicitly, then skipping the package entirely in the loop
            # below) -- that skip was correct when ipc_transport_test.dart
            # was the package's ONLY integration test, but flutter_pear-g28
            # later added bee_transport_test.dart, drive_transport_test.dart,
            # pairing_transport_test.dart, base_transport_test.dart, and
            # store_transport_test.dart to that SAME directory, and a
            # package-level skip would have silently never run any of them
            # in CI -- caught only by manually re-deriving this loop's logic
            # against the new file layout, not by any automated check, so
            # take this comment as a warning: if this loop is ever
            # special-cased by package again, re-verify it against every
            # file actually present, not just the file(s) that motivated the
            # special-case at the time.
            #
            # Individual per-FILE invocation (not `flutter test
            # integration_test -d ...` on the whole directory) is
            # deliberate: flutter_pear_example's own integration_test/ also
            # contains bulk_transport_benchmark_test.dart, a timing
            # measurement re-validated only via the manual `benchmark-manual`
            # job below, not a correctness test for this per-push matrix --
            # running the directory as a whole would sweep it in too.
            for it_dir in packages/*/integration_test packages/*/example/integration_test; do
              [ -d "$it_dir" ] || continue
              app_dir="$(dirname "$it_dir")"
              for test_file in "$it_dir"/*_test.dart; do
                [ -f "$test_file" ] || continue
                case "$test_file" in *benchmark*) continue ;; esac
                rel_path="${test_file#"$app_dir"/}"
                echo "::group::integration test: $test_file"
                (cd "$app_dir" && flutter pub get && flutter test "$rel_path" -d emulator-5554)
                echo "::endgroup::"
              done
            done

  emulator-arm64:
    name: Emulator smoke (arm64-v8a, API 34, macos-arm64)
    runs-on: macos-latest
    # See emulator-x86_64's identical comment: was 25, raised to 35 for the
    # same uncached-first-run reasoning; AVD/Gradle/Flutter caching below
    # should make steady-state runs land well under this.
    timeout-minutes: 35
    concurrency:
      group: ci-emulator-arm64-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: flutter pub get (flutter_pear_example)
        working-directory: packages/flutter_pear_example
        run: flutter pub get

      - name: AVD cache
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          # Shared with benchmark-manual below -- same runner OS/arch/API
          # level, so the same AVD snapshot is valid for both, whichever
          # job populates it first.
          key: avd-macos-arm64-v8a-34-v1

      - name: create AVD and generate snapshot for caching
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: default
          arch: arm64-v8a
          force-avd-creation: false
          emulator-options: >-
            -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
            -camera-back none
          disable-animations: false
          script: echo "Generated AVD snapshot for caching."

      - name: Boot arm64-v8a emulator + run the real-worklet integration smoke (STEPS 1-2, CODEX AUDIT FIX)
        # arm64-v8a on macos-latest, NOT x86_64 -- see this file's header
        # comment on runner/arch pairing. API 34 matches the x86_64 job's
        # "current" leg and COMPATIBILITY.md's pinned compileSdk; the
        # ticket only asks for a single arm64-v8a configuration (not a
        # min+current pair the way x86_64 gets), so there's no matrix here.
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: default
          arch: arm64-v8a
          force-avd-creation: false
          emulator-options: >-
            -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
            -camera-back none
          disable-animations: true
          script: |
            set -euo pipefail
            # Per-package integration coverage (STEP 2, tracked as
            # flutter_pear-g28) -- see emulator-x86_64's identical loop for
            # the full history/rationale (why flutter_pear_example is no
            # longer package-skipped, and why each file runs individually
            # rather than the whole directory at once).
            for it_dir in packages/*/integration_test packages/*/example/integration_test; do
              [ -d "$it_dir" ] || continue
              app_dir="$(dirname "$it_dir")"
              for test_file in "$it_dir"/*_test.dart; do
                [ -f "$test_file" ] || continue
                case "$test_file" in *benchmark*) continue ;; esac
                rel_path="${test_file#"$app_dir"/}"
                echo "::group::integration test: $test_file"
                (cd "$app_dir" && flutter pub get && flutter test "$rel_path" -d emulator-5554)
                echo "::endgroup::"
              done
            done

  # ---------------------------------------------------------------------
  # STEP 5 (arm64 physical-device coverage): the two emulator-* jobs above
  # already give REAL, hardware-accelerated arm64-v8a ABI coverage on every
  # push and pull_request -- see the CODEX AUDIT FIX note on
  # flutter_pear-df9.4 for why that's a genuinely different claim than
  # "arm64 is untested". What these
  # jobs do NOT and CANNOT cover is physical-device behavior: real radios,
  # real cameras, OEM firmware quirks, actual Bluetooth/Wi-Fi Direct/mDNS
  # discovery timing. That physical-hardware leg remains the quarterly
  # human audit this project has already committed to elsewhere (see
  # project_plan.md's "CI-timed + quarterly human audit" TTHW commitment
  # and its `flutter_pear-doi` tracking issue for the hardware-validation
  # pass) -- this workflow does not claim to replace it, and no job here
  # should ever be read as having done so.
  # ---------------------------------------------------------------------

  benchmark-manual:
    name: Bulk-transport benchmark (manual only, E5.1 decision-record re-validation)
    # Deliberately NOT part of the push-triggered matrix -- see this file's
    # workflow_dispatch `run_benchmark` input description and
    # bulk_transport_benchmark_test.dart's own header comment: this is a
    # timing measurement backing a LOCKED decision record
    # (packages/flutter_pear/BENCHMARK.md), not a correctness test, and
    # would add timing noise/flakiness to routine CI for zero pass/fail
    # value.
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.run_benchmark == 'true'
    runs-on: macos-latest
    # See emulator-arm64's identical comment: was 25, raised to 35 for the
    # same uncached-first-run reasoning. The AVD-boot caching below only
    # affects boot time, not the benchmark's own measured runtime
    # throughput, so it doesn't touch BENCHMARK.md's decision-record
    # validity.
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: flutter pub get (flutter_pear_example)
        working-directory: packages/flutter_pear_example
        run: flutter pub get

      - name: AVD cache
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          # Shared with emulator-arm64 above -- same runner OS/arch/API
          # level.
          key: avd-macos-arm64-v8a-34-v1

      - name: create AVD and generate snapshot for caching
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: default
          arch: arm64-v8a
          force-avd-creation: false
          emulator-options: >-
            -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
            -camera-back none
          disable-animations: false
          script: echo "Generated AVD snapshot for caching."

      - name: Boot arm64-v8a emulator + run the bulk-transport benchmark
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: default
          arch: arm64-v8a
          force-avd-creation: false
          emulator-options: >-
            -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
            -camera-back none
          disable-animations: true
          working-directory: packages/flutter_pear_example
          script: flutter test integration_test/bulk_transport_benchmark_test.dart -d emulator-5554
