name: Publish

# E9.7 (flutter_pear-df9.7): publish-on-tag mechanics for the three
# publishable packages (flutter_pear, flutter_pear_bare, flutter_pear_test --
# flutter_pear_example is an app, never published).
#
# THIS FILE DOES NOT MAKE A REAL PUBLISH POSSIBLE BY ITSELF. Four more
# things a human must still do, none of which this file (or any agent) can
# do on your behalf:
#   0. FIRST RELEASE ONLY, and it must happen BEFORE step 1 below: pub.dev's
#      "Automated publishing from GitHub Actions" (trusted/OIDC publishing)
#      can only be configured for a package that already exists on pub.dev
#      (https://dart.dev/tools/pub/automated-publishing: "Today, you can
#      only automate publishing of existing packages. To create a new
#      package, you must publish the first version using `dart pub
#      publish`."). None of these three packages have ever been published
#      (confirmed: pub.dev/api/packages/<name> 404s for all three today), so
#      the Admin tab step 1 describes literally does not exist yet for any
#      of them. A human must run `dart pub publish` (interactive, local
#      login) ONCE per package, in the enforced order below
#      (flutter_pear_bare -> flutter_pear -> flutter_pear_test), completely
#      outside this workflow, before trusted publishing -- and therefore
#      this entire file -- can be used at all. Every release after that
#      first manual bootstrap can go through this workflow normally.
#   1. On pub.dev, for EACH of the three packages' Admin tab (available only
#      after step 0), configure "Automated publishing from GitHub Actions":
#      repository `<owner>/flutter_pear`, tag pattern `v{{version}}`. Until
#      this is done per package, pub.dev will reject the OIDC token this
#      workflow presents and the real-publish jobs below will fail at the
#      "Publish to pub.dev" step -- which is the correct, safe failure mode
#      for an unconfigured package.
#   2. In this repo's Settings -> Environments, create an environment named
#      exactly `pub-dev-release` (the name referenced by the `environment:`
#      inputs below) and add at least one required reviewer to it. This is
#      NOT optional and NOT safe to defer: per GitHub's own docs, a job
#      that references an environment name which doesn't exist yet
#      AUTO-CREATES it on the spot with ZERO protection rules and lets the
#      job proceed immediately -- i.e. the failure mode for skipping this
#      step is FAIL-OPEN (an unattended, unapproved real `dart pub publish
#      -f` runs the instant a matching tag is pushed), not fail-closed and
#      not "skipped". This workflow no longer trusts a human to have
#      remembered this: the `verify-release-environment` job below calls
#      the GitHub API to confirm the environment exists and has a
#      required-reviewers rule configured, and hard-fails the whole run
#      before anything else executes if it doesn't. Treat that job as the
#      enforcement mechanism, not this comment.
#   3. Bump all three packages' `version:` fields (pubspec.yaml) to the SAME
#      version and land that on the branch you tag -- a single tag
#      `vX.Y.Z` must match `X.Y.Z` for whichever package pub.dev is
#      currently validating the OIDC claim against.
#
# --- Why the order is bare -> flutter_pear -> flutter_pear_test, not the
# --- "bare -> test -> pear" the original ticket text stated:
#
# flutter_pear_bare has no sibling-package dependency. flutter_pear has a
# REAL (non-dev) dependency on flutter_pear_bare, plus a dev-only *path*
# dependency on flutter_pear_test (see flutter_pear/pubspec.yaml -- it must
# stay `path:`, never hosted; a hosted dev_dependency still has to resolve
# during `pub get`, which deadlocks against the very publish order this
# file enforces). flutter_pear_test has REAL (non-dev) dependencies on BOTH
# flutter_pear and flutter_pear_bare. pub.dev requires a package's non-dev
# dependencies to already be published before IT can be published. The only
# order that satisfies every real edge is:
#
#     flutter_pear_bare  -->  flutter_pear  -->  flutter_pear_test
#
# `melos list --cycles` reports one cycle in this workspace
# (`flutter_pear_test -> flutter_pear`), which is why the original ticket
# text assumed the order needed juggling -- but that tool deliberately
# merges dev_dependencies into the same graph as real dependencies. Once
# the dev-only edge is excluded (as pub's own publish validator does), the
# real-edge graph is a plain DAG with no cycle at all, and the order above
# is simply the correct topological sort of it.
#
# This was verified empirically: `dart pub publish --dry-run`/`pub get`
# against the current pubspecs (flutter_pear_bare and flutter_pear's real
# dependency hosted, flutter_pear_test's dev dependency kept as `path:`),
# run from an isolated scratch copy of each package with NO `melos
# bootstrap` and NO pubspec_overrides.yaml (i.e. exactly what stage 3's
# `actions/checkout` + `dart-lang/setup-dart` reusable workflow actually
# does), with each already-published sibling's hosted dependency locally
# path-overridden ONLY to stand in for "already on pub.dev from an earlier
# job in the `needs:` chain": all three packages resolved and dry-ran clean
# (0 blocking errors, 0 warnings once flutter_pear's docs/->doc/ rename
# landed -- see flutter_pear/pubspec.yaml's `doc/` note). Earlier revisions
# of this file and its pubspecs flipped the flutter_pear_test dev
# dependency to a hosted constraint "for uniformity" and validated it only
# with `melos bootstrap`'s generated (gitignored) pubspec_overrides.yaml in
# place -- exactly the condition that masks the deadlock, since stage 3's
# real-publish jobs never run `melos bootstrap` and therefore never get
# that override. Do not repeat that mistake: any sibling dependency this
# workflow expects to resolve without a published pub.dev entry AND without
# melos bootstrap having run must be declared as `path:` directly in the
# tracked pubspec.yaml, not hosted.
on:
  push:
    tags:
      # Matches the GitHub-side half of pub.dev's own tag-pattern contract
      # (`v{{version}}`, configured per-package on pub.dev -- see the header
      # comment above). Deliberately does NOT restrict this to a specific
      # branch: pub.dev's own trusted-publishing check is what actually
      # gates a real publish (it verifies the OIDC claim's ref against what
      # you configured on pub.dev), not this filter -- this filter only
      # decides when the workflow *runs* at all.
      - 'v*.*.*'
  # Lets a maintainer run the untested-code-never-published gate (the
  # `test` job) and the fully-inspectable `dry-run-publish` job on demand,
  # without needing to push a throwaway tag, e.g. to sanity-check a change
  # to this very file. This can ALSO reach the three real-publish jobs
  # below (nothing in this file's own logic stops it), but pub.dev's own
  # trusted-publishing check independently requires the triggering event to
  # be an actual matching tag push (see the dart.dev automated-publishing
  # docs cited above) -- a workflow_dispatch run that somehow got approved
  # through the environment gate would still be rejected server-side at the
  # "Publish to pub.dev" step. Defense in depth, not the only gate.
  workflow_dispatch:

jobs:
  # ---------------------------------------------------------------------
  # Stage 0: fail CLOSED, automatically, if a human skipped header step 2.
  #
  # GitHub's own documented behavior for a job that references an
  # `environment:` name which doesn't exist yet is to auto-create it with
  # ZERO protection rules and let the job proceed immediately -- i.e.
  # fail-OPEN, not fail-closed and not "skipped" (verified against GitHub's
  # Environments docs). Relying on a human to have remembered to create
  # `pub-dev-release` with required reviewers, with nothing checking that
  # they actually did, is exactly the gap that would let an accidental or
  # premature tag push trigger a real, unattended `dart pub publish -f`.
  #
  # This job calls the GitHub API (read-only; it never creates or modifies
  # anything) to confirm the `pub-dev-release` environment (a) exists and
  # (b) has a `required_reviewers` protection rule configured, and hard-
  # fails the entire run before `test` or anything downstream executes if
  # not. If the API call itself fails for any other reason (e.g. the
  # default GITHUB_TOKEN lacks permission to read environment config in
  # this repo/org's settings), that ALSO fails this job -- deliberately: an
  # inconclusive check must block the pipeline, not wave it through.
  # ---------------------------------------------------------------------
  verify-release-environment:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Confirm pub-dev-release environment exists with required reviewers
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          REPO="${{ github.repository }}"
          ENV_NAME="pub-dev-release"
          echo "Checking repo '$REPO' for a properly protected '$ENV_NAME' environment..."
          if ! response=$(gh api "repos/$REPO/environments/$ENV_NAME" 2>/tmp/gh_env_err.log); then
            echo "::error::Could not read the '$ENV_NAME' GitHub Environment (see log below)."
            echo "::error::If it genuinely does not exist yet: per GitHub's docs, the FIRST time a job below references it, GitHub auto-creates it with NO protection rules and lets that job run immediately -- an unattended, unapproved real 'dart pub publish -f' would follow. A human must create '$ENV_NAME' under this repo's Settings > Environments, with at least one required reviewer, BEFORE re-running this workflow."
            echo "::error::If it does exist: this token may lack permission to read environment configuration -- investigate before retrying; this check fails closed on purpose."
            cat /tmp/gh_env_err.log || true
            exit 1
          fi
          reviewer_rules=$(echo "$response" | jq '[.protection_rules[]? | select(.type == "required_reviewers")] | length')
          if [ "$reviewer_rules" -lt 1 ]; then
            echo "::error::The '$ENV_NAME' environment exists but has NO required-reviewers protection rule configured. Without one, the real-publish jobs later in this workflow run fully unattended the instant a matching tag is pushed. Add at least one required reviewer under Settings > Environments > $ENV_NAME, then re-run this workflow."
            exit 1
          fi
          echo "OK: '$ENV_NAME' exists and requires reviewer approval."

  # ---------------------------------------------------------------------
  # Stage 1: never publish something untested. Literal STEP 2 text: "runs
  # melos bootstrap + analyze + test first". Deliberately NOT a full copy
  # of ci.yml's much larger `test` job (compat-table check, README/docs
  # snippet extraction, pear-end's own JS test suite, pana score gate) --
  # every push to this repo already runs that full gate via ci.yml before
  # a commit can plausibly reach a tag; this job is the final, cheap
  # re-check the ticket explicitly asked for, not a re-implementation of
  # CI.
  # ---------------------------------------------------------------------
  test:
    needs: verify-release-environment
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Show trigger context
        # A quick, always-visible confirmation of what actually kicked this
        # run off -- e.g. on a real release this should read
        # "event=push ref=refs/tags/v0.1.0 ref_name=v0.1.0", not
        # "event=workflow_dispatch ...", before anyone bothers reviewing
        # the dry-run stage below.
        run: |
          echo "event=${{ github.event_name }}"
          echo "ref=${{ github.ref }}"
          echo "ref_name=${{ github.ref_name }}"

      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Activate melos
        run: dart pub global activate melos

      - name: melos bootstrap
        run: melos bootstrap

      - name: melos run analyze
        run: melos run analyze

      - name: melos run test
        # --no-select: this melos version otherwise prompts interactively
        # to pick a package even in a non-interactive shell (see ci.yml's
        # identical step for the same note).
        run: melos run test --no-select

  # ---------------------------------------------------------------------
  # Stage 2: dry-run publish all three packages, IN THE ENFORCED ORDER,
  # with NO approval gate -- this is deliberately its own job (not folded
  # into the gated real-publish jobs below) so its full output can
  # complete and be read/reviewed by a human BEFORE anyone is asked to
  # approve a real publish. The real-publish jobs (stage 3) also each run
  # their own dry-run internally as a final immediate-pre-publish check
  # (that's `dart-lang/setup-dart`'s reusable workflow's own built-in
  # behavior, not something this file adds) -- that's cheap, harmless
  # belt-and-suspenders, not a substitute for this inspectable stage.
  #
  # `melos bootstrap` here generates the (gitignored) pubspec_overrides.yaml
  # that redirects the hosted sibling-package constraints back to local
  # paths -- necessary because NONE of the three packages exist on pub.dev
  # yet at dry-run time, so `flutter_pear_bare: ^0.0.1` etc. would otherwise
  # fail to resolve at all. Confirmed this is exactly what happens (and
  # that it does not affect what pub.dev packs -- pubspec_overrides.yaml is
  # never part of the published tarball) via a real `dart pub publish
  # --dry-run` run against a scratch copy; see this ticket's closing report
  # for the full transcripts.
  #
  # Each dry-run step uses `continue-on-error: true` and its own log +
  # exit-code file rather than letting a nonzero exit fail the step
  # outright, because `dart pub publish --dry-run` exits 65 for WARNINGS
  # and HINTS too, not just for the one thing that's actually a hard block
  # (pub's own "can't be published yet" message, from `lib/src/command/
  # lish.dart`'s `dataError(...)` call) -- e.g. this repo's
  # pubspec_overrides.yaml override is itself always reported as a hint,
  # and a merely-dirty git working tree at CI time is reported as a
  # warning. The final "check for blocking publish errors" step below is
  # what actually decides pass/fail -- it checks BOTH the captured exit
  # code (treating only 0/clean and 65/warnings-or-hints-only as
  # non-blocking; anything else means the dry run never even reached
  # publish validation, e.g. a dependency-resolution failure) AND the log
  # text for pub's specific hard-error message. Checking only the message
  # (the original version of this gate) silently passed a dry run that
  # crashed before validation ever started -- reproduced and fixed.
  # ---------------------------------------------------------------------
  dry-run-publish:
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Activate melos
        run: dart pub global activate melos

      - name: melos bootstrap
        run: melos bootstrap

      # Each dry-run step writes its own exit code to a file, not just its
      # log, and does NOT pipe through `tee` -- piping would make `$?`
      # reflect `tee`'s exit code, not `dart pub publish`'s (this bit the
      # original version of this gate: it only ever grepped the log for one
      # specific hard-error string and never looked at the exit code at
      # all, so a totally different failure -- e.g. dependency resolution
      # blowing up before pub ever reaches publish validation -- produced a
      # log with none of that string in it and was silently reported as
      # "no blocking publish errors". Reproduced and fixed; see the "Check
      # for blocking publish errors" step below).
      - name: Dry-run publish flutter_pear_bare (1st -- no sibling deps)
        id: dry_run_bare
        continue-on-error: true
        working-directory: packages/flutter_pear_bare
        run: |
          dart pub publish --dry-run > /tmp/dry-run-flutter_pear_bare.log 2>&1
          echo $? > /tmp/dry-run-flutter_pear_bare.exit

      - name: Dry-run publish flutter_pear (2nd -- depends on flutter_pear_bare)
        id: dry_run_pear
        continue-on-error: true
        working-directory: packages/flutter_pear
        run: |
          dart pub publish --dry-run > /tmp/dry-run-flutter_pear.log 2>&1
          echo $? > /tmp/dry-run-flutter_pear.exit

      - name: Dry-run publish flutter_pear_test (3rd -- depends on both)
        id: dry_run_test
        continue-on-error: true
        working-directory: packages/flutter_pear_test
        run: |
          dart pub publish --dry-run > /tmp/dry-run-flutter_pear_test.log 2>&1
          echo $? > /tmp/dry-run-flutter_pear_test.exit

      - name: Check for blocking publish errors
        run: |
          set -u
          fail=0
          for pkg in flutter_pear_bare flutter_pear flutter_pear_test; do
            log="/tmp/dry-run-$pkg.log"
            code="$(cat "/tmp/dry-run-$pkg.exit" 2>/dev/null || echo unknown)"
            # `dart pub publish --dry-run` exits 0 for a fully clean dry run
            # and 65 (DATA) when it completed and found only warnings/hints
            # to review -- both are non-blocking outcomes for this gate (a
            # human reviews the printed warnings/hints below before
            # approving the real-publish stage). ANY OTHER exit code means
            # the dry run never reached pub's publish validation at all
            # (e.g. 69/USAGE for a dependency-resolution failure such as
            # "version solving failed") -- that is unconditionally
            # blocking, even though the log won't contain the
            # "can't be published yet" wording the grep below looks for,
            # because publication was never actually attempted.
            if [ "$code" != "0" ] && [ "$code" != "65" ]; then
              echo "::error::$pkg: dry-run did not complete normally (exit"\
                   "$code, expected 0 or 65) -- it likely never reached"\
                   "pub's publish validation at all (e.g. a dependency"\
                   "resolution failure). Full log:"
              cat "$log"
              fail=1
            elif grep -q "can't be published yet" "$log"; then
              echo "::error::$pkg has a BLOCKING publish error -- see the"\
                   "'Dry-run publish $pkg' step's log above."
              fail=1
            else
              echo "$pkg: no blocking publish errors (exit $code; any"\
                   "warnings/hints above are advisory -- review them before"\
                   "approving the real-publish stage)."
            fi
          done
          exit $fail

  # ---------------------------------------------------------------------
  # Stage 3: the real publish, one job per package, chained with `needs:`
  # so the order from the header comment is enforced by the job graph
  # itself -- not by a single `melos publish` call (melos's own cycle
  # detector's fallback ordering, sorting cyclic-component members by name
  # length descending, would put flutter_pear_test BEFORE flutter_pear --
  # the wrong order, since flutter_pear_test really depends on
  # flutter_pear -- so this deliberately never calls unscoped `melos
  # publish`), and not by comments/memory.
  #
  # Each job:
  #   - requires `dry-run-publish` (stage 2) to have passed first.
  #   - uses dart-lang's own official reusable publish workflow rather than
  #     hand-rolling credential handling (the literal ticket ask: "use
  #     melos publish if it covers it; verify rather than hand-roll" --
  #     this is the dart-lang-maintained equivalent for the per-package
  #     case melos's own ordering can't safely handle here). It
  #     authenticates via a short-lived GitHub-issued OIDC token
  #     ("Trusted Publishing"), not a long-lived secret -- see
  #     https://dart.dev/tools/pub/automated-publishing. No
  #     PUB_CREDENTIALS-style secret exists in this repo and none needs to
  #     -- do not add one on a hunch; only fall back to a credentials-file
  #     secret (e.g. a repo secret consumed as
  #     `${{ secrets.PUB_CREDENTIALS }}`, written to pub's credentials
  #     path before a plain `dart pub publish -f`) if a future package in
  #     this repo genuinely can't use trusted publishing, and say so in a
  #     comment when you do.
  #   - passes `environment: pub-dev-release` to the reusable workflow,
  #     which applies GitHub's environment protection to that job --
  #     REQUIRES a human to have created this exact environment name under
  #     this repo's Settings -> Environments with required reviewers (see
  #     the header comment). Not created by this file, not created by any
  #     agent.
  #   - needs `permissions: id-token: write` itself (a reusable workflow
  #     only gets the permissions its caller job explicitly grants).
  # ---------------------------------------------------------------------
  publish-flutter-pear-bare:
    needs: dry-run-publish
    permissions:
      id-token: write
      contents: read
    uses: dart-lang/setup-dart/.github/workflows/publish.yml@v1
    with:
      working-directory: packages/flutter_pear_bare
      environment: pub-dev-release

  publish-flutter-pear:
    needs: publish-flutter-pear-bare
    permissions:
      id-token: write
      contents: read
    uses: dart-lang/setup-dart/.github/workflows/publish.yml@v1
    with:
      working-directory: packages/flutter_pear
      environment: pub-dev-release

  publish-flutter-pear-test:
    needs: publish-flutter-pear
    permissions:
      id-token: write
      contents: read
    uses: dart-lang/setup-dart/.github/workflows/publish.yml@v1
    with:
      working-directory: packages/flutter_pear_test
      environment: pub-dev-release
